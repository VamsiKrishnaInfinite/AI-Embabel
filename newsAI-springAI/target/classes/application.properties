spring.application.name=newsAI

server.port=8081

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3:latest
spring.ai.ollama.chat.options.temperature=0.7
# 1. Disable the crashing AutoConfigurations
spring.autoconfigure.exclude=\
  org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration,\
  org.springframework.ai.mcp.client.common.autoconfigure.annotations.McpClientAnnotationScannerAutoConfiguration

# 2. Allow our manual beans to take over
spring.main.allow-bean-definition-overriding=true

logging.level.org.springframework.ai=DEBUG
embabel.models.default-llm=llama3:latest
embabel.models.llama3.type=ollama
embabel.models.llama3.base-url=http://localhost:11434
embabel.models.llama3.options.temperature=0.7