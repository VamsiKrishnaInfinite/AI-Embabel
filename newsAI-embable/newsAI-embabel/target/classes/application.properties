# ===================================================================
# 1. Basic Spring Settings
# ===================================================================
spring.application.name=news-ai-embabel
server.port=8080
# Crucial: Allows our custom LlmService bean to override defaults
spring.main.allow-bean-definition-overriding=true

# ===================================================================
# 2. Spring AI & Ollama Config
# ===================================================================
spring.ai.ollama.base-url=http://localhost:11434
# This is what Ollama actually runs
spring.ai.ollama.chat.options.model=llama3:latest
spring.ai.ollama.chat.options.temperature=0.7

# Disable unused AI components to prevent startup bean crashes
spring.ai.mcp.client.enabled=false
spring.ai.openai.chat.enabled=false
spring.autoconfigure.exclude=\
   org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration,\
   org.springframework.ai.mcp.client.common.autoconfigure.annotations.McpClientAnnotationScannerAutoConfiguration
# \
#  \
#  \
#  org.springframework.ai.mcp.client.autoconfigure.McpClientAutoConfiguration,\
#  \org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration,\
#  \org.springframework.ai.mcp.client.common.autoconfigure.annotations.McpClientAnnotationScannerAutoConfiguration,\
#  \org.springframework.ai.mcp.client.autoconfigure.McpClientAutoConfiguration,\
#  \com.embabel.agent.config.models.ollama.OllamaModelsConfig,\
#  \org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration,\
#  \org.springframework.ai.mcp.client.common.autoconfigure.annotations.McpClientAnnotationScannerAutoConfiguration


#Force the client type to RestClient (Standard for Spring 4)
spring.ai.ollama.client-type=rest_client
# ===================================================================
# 3. Embabel 0.3.4 Bridge Configuration
# ===================================================================
# We use 'gpt-4.1-mini' here because our Config class maps it to Llama3.
# This satisfies the internal Embabel validator.
embabel.models.llms.best=gpt-4.1-mini
embabel.models.llms.cheapest=gpt-4.1-mini
embabel.models.default-llm=gpt-4.1-mini

# Fixes the internal ranking/agent-platform validation
embabel.agent.ranking.llm=gpt-4.1-mini
embabel.agent.llm.model-id=gpt-4.1-mini





# ===================================================================
# 4. Agent Scanning & Logging
# ===================================================================
# Ensure this matches your package name EXACTLY
embabel.agents.scan-packages=com.infinite.newsAIEmbael.agent

# Theming and Debugging
embabel.logging.theme=starwars
logging.level.com.embabel=DEBUG
logging.level.org.springframework.ai=DEBUG
