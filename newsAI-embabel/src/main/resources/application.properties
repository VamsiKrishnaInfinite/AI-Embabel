# Basic Spring settings
spring.application.name=news-ai-embabel
server.port=8080

# Spring AI Ollama Config
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.temperature=0.7

# Embabel Global Default Model Configuration
# These properties stop the search for 'gpt-4.1-mini'
embabel.models.llms.best=llama3:latest
embabel.models.llms.cheapest=llama3:latest

# Embabel Ranking and Agent Platform Defaults
# This specifically fixes the "ranking LLM defaulting to gpt-4.1-mini" issue
embabel.agent-platform.ranking.llm=llama3:latest

# Agent Scanning and Logging
embabel.agents.scan-packages=com.infinite.newsAIEmbael.agent
embabel.logging.theme=starwars

# Debug logs to verify bean loading
logging.level.com.embabel=DEBUG
logging.level.org.springframework.ai=DEBUG
# Match your Ollama 'name' exactly

# Match your local Ollama setup
spring.ai.ollama.chat.options.model=llama3:latest
spring.main.allow-bean-definition-overriding=true

# Force Embabel to use the 'fake' ID that the validator expects
embabel.ai.llm.model-id=gpt-4.1-mini
embabel.ranking.llm=gpt-4.1-mini
embabel.models.default-llm=gpt-4.1-mini

